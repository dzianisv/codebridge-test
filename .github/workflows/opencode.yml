name: opencode-e2e-test

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [assigned, opened]

jobs:
  opencode:
    if: |
      (github.event_name == 'issues' && (github.event.action == 'assigned' || github.event.action == 'opened')) ||
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build opencode from fork
        run: |
          git clone --depth 1 --branch feat/github-issue-assignment https://github.com/dzianisv/opencode.git /tmp/opencode-src
          cd /tmp/opencode-src
          bun install --frozen-lockfile
          cd packages/opencode
          bun run build
          mkdir -p ~/.opencode/bin
          cp dist/opencode ~/.opencode/bin/opencode
          chmod +x ~/.opencode/bin/opencode
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run opencode
        run: opencode github run
        env:
          MODEL: opencode/claude-sonnet
